name: Flutter Nightly Build

on:
  # SYSINFRA: Cron deaktiviert — wir bauen on-demand (naechtliche Builds
  # ueberschrieben sonst die Kunden-Assets mit Default-Namen).
  workflow_dispatch:

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
